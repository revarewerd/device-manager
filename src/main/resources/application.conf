# ============================================================
# Конфигурация Device Manager Service
# ============================================================
# 
# Переменные окружения для переопределения:
# - APP_HTTP_PORT
# - APP_DATABASE_HOST, APP_DATABASE_PORT, APP_DATABASE_PASSWORD
# - APP_KAFKA_BOOTSTRAP_SERVERS
# - APP_REDIS_HOST, APP_REDIS_PORT, APP_REDIS_PASSWORD
# ============================================================

app {
  # Общие настройки приложения
  app {
    default-organization-id = 1
    default-organization-id = ${?APP_DEFAULT_ORGANIZATION_ID}
  }
  
  # HTTP API
  http {
    host = "0.0.0.0"
    host = ${?APP_HTTP_HOST}
    port = 10092
    port = ${?APP_HTTP_PORT}
  }
  
  # PostgreSQL
  database {
    host = "localhost"
    host = ${?APP_DATABASE_HOST}
    port = 5432
    port = ${?APP_DATABASE_PORT}
    database = "device_manager"
    database = ${?APP_DATABASE_NAME}
    username = "postgres"
    username = ${?APP_DATABASE_USERNAME}
    password = "postgres"
    password = ${?APP_DATABASE_PASSWORD}
    
    # HikariCP пул соединений
    pool-size = 10
    pool-size = ${?APP_DATABASE_POOL_SIZE}
    connection-timeout = 30000  # 30 секунд
    connection-timeout = ${?APP_DATABASE_CONNECTION_TIMEOUT}
  }
  
  # Kafka
  kafka {
    bootstrap-servers = "localhost:9092"
    bootstrap-servers = ${?APP_KAFKA_BOOTSTRAP_SERVERS}
    
    group-id = "device-manager"
    group-id = ${?APP_KAFKA_GROUP_ID}
    
    unknown-devices-topic = "unknown-devices"
    unknown-devices-topic = ${?APP_KAFKA_UNKNOWN_DEVICES_TOPIC}
    
    topics {
      device-events = "device-events"
      device-events = ${?APP_KAFKA_TOPICS_DEVICE_EVENTS}
      vehicle-events = "vehicle-events"
      vehicle-events = ${?APP_KAFKA_TOPICS_VEHICLE_EVENTS}
      organization-events = "organization-events"
      organization-events = ${?APP_KAFKA_TOPICS_ORGANIZATION_EVENTS}
    }
    
    producer {
      acks = "all"
      linger-ms = 5
      batch-size = 16384
      compression-type = "lz4"
    }
  }
  
  # Redis (для синхронизации с Connection Manager)
  redis {
    host = "localhost"
    host = ${?APP_REDIS_HOST}
    port = 6379
    port = ${?APP_REDIS_PORT}
    password = null
    password = ${?APP_REDIS_PASSWORD}
    database = 0
    database = ${?APP_REDIS_DATABASE}
    
    # TTL кэша устройств (1 час)
    device-cache-ttl = 3600
    device-cache-ttl = ${?APP_REDIS_DEVICE_CACHE_TTL}
  }
}
